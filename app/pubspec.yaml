name: artifact_reports
description: Social media analytics & reporting app. iOS-first, multi-tenant, subscription-based.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1

  cupertino_icons: ^1.0.8

  # Heavier deps (supabase_flutter, go_router, freezed, in_app_purchase,
  # fl_chart, printing, flutter_secure_storage) land milestone-by-milestone
  # to keep dependency resolution stable.

dev_dependencies:
  flutter_test:
    sdk: flutter

  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
