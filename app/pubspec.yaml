name: artifact_reports
description: Social media analytics & reporting app. iOS-first, multi-tenant, subscription-based.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State management & routing
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.6.0

  # Models & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage & security
  flutter_secure_storage: ^9.2.2

  # In-app purchase (StoreKit 2 via plugin)
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.3.18

  # UI
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1

  # Reports
  printing: ^5.13.4
  pdf: ^3.11.1

  # i18n
  intl: ^0.19.0

  # Utilities
  cupertino_icons: ^1.0.8
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lint
  very_good_analysis: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2
  custom_lint: ^0.6.4
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  generate: true
