name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

jobs:
  migrations-dry-run:
    name: Apply migrations to ephemeral Postgres
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap required extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c \
            "create schema if not exists auth; create table if not exists auth.users (id uuid primary key default gen_random_uuid());"

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done
