name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

# Pages deploys require these permissions on the workflow token.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy when a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add web platform (in case it isn't checked in yet)
        run: flutter create . --platforms=web --project-name=artifact_reports

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # GitHub Pages serves from /<repo>/, so the base href must match.
      # Inject SUPABASE_URL / SUPABASE_ANON_KEY (and PUBLIC_REPORT_BASE_URL)
      # from repo secrets so the auth + sync flows go live on the preview.
      # Anon key is safe to ship in the bundle — RLS gates every row.
      # If secrets are unset the build still succeeds; Env.isConfigured
      # returns false and the dashboard placeholder renders.
      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PUBLIC_REPORT_BASE_URL: ${{ secrets.PUBLIC_REPORT_BASE_URL }}
        run: |
          flutter build web \
            --release \
            --base-href "/${GITHUB_REPOSITORY##*/}/" \
            --no-tree-shake-icons \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=PUBLIC_REPORT_BASE_URL="$PUBLIC_REPORT_BASE_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
